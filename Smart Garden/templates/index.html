<!DOCTYPE html>
<html>
<head>
    <title>Smart Garden Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1abc9c, #16a085);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
        }

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .card {
            background: white;
            color: #2c3e50;
            width: 260px;
            margin: 15px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.3);
        }

        .value {
            font-size: 28px;
            font-weight: bold;
            margin-top: 10px;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 30px;
            border: none;
            background: #2c3e50;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #34495e;
        }

        .status {
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>🌱 Smart Garden IoT Dashboard</h1>

<p>Status: <span id="status" class="status">Disconnected</span></p>

<button onclick="connectMQTT()">Connect & Subscribe</button>

<div class="container">

    <div class="card">
        <h3>Raw Data</h3>
        <div id="raw">Waiting...</div>
    </div>

    <div class="card">
        <h3>Water Stress Index</h3>
        <div id="wsi" class="value">--</div>
    </div>

    <div class="card">
        <h3>Sprinkler Time</h3>
        <div id="water" class="value">-- sec</div>
    </div>

</div>

<script>

    var socket = io();

    socket.on("connect", function() {
        document.getElementById("status").innerText = "Connected";
        document.getElementById("status").style.color = "lime";
    });

    socket.on("disconnect", function() {
        document.getElementById("status").innerText = "Disconnected";
        document.getElementById("status").style.color = "red";
    });

    socket.on("update", function(data) {
        document.getElementById("raw").innerText = data.raw_message;
        document.getElementById("wsi").innerText = data.wsi;
        document.getElementById("water").innerText = data.water_time + " sec";
    });

    socket.on("status", function(data) {
        alert(data.message);
    });

    function connectMQTT() {
        socket.emit("connect_mqtt");
    }

</script>

</body>
</html>
